name: "Free DevSecOps — Security Pipeline"

on: [push, pull_request]

jobs:

  # ─── JOB 1 ── Gitleaks : patterns de secrets connus ─────────────────────────
  gitleaks:
    name: "1 — Secrets (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── JOB 2 ── TruffleHog : entropie + historique git complet ────────────────
  trufflehog:
    name: "2 — Secrets historique (TruffleHog)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog — scan complet du dépôt
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --only-verified

  # ─── JOB 3 ── Semgrep : analyse statique du code (SAST) ─────────────────────
  semgrep:
    name: "3 — SAST (Semgrep)"
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep — audit sécurité Python
        run: semgrep --config "p/python" --config "p/security-audit" --error .

  # ─── JOB 4 ── pip-audit : CVE dans les dépendances Python ───────────────────
  pip-audit:
    name: "4 — Dépendances (pip-audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit — scan CVE dépendances
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  # ─── JOB 5 ── Trivy : CVE dans l'image Docker ───────────────────────────────
  trivy:
    name: "5 — Image conteneur (Trivy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t free-lab:ci .
      - name: Trivy — scan image Docker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: free-lab:ci
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
